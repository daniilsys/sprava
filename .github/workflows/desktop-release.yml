name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
  SPRAVA_API_URL: ${{ vars.SPRAVA_API_URL }}
  VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL }}
  VITE_HCAPTCHA_SITEKEY: ${{ vars.VITE_HCAPTCHA_SITEKEY }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_target: ""
          - platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/sprava/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/sprava/src-tauri -> target

      # Linux: install system dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Install frontend dependencies
        working-directory: apps/desktop/sprava
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Write .env.production for Vite
        working-directory: apps/desktop/sprava
        run: |
          cat > .env.production << EOF
          VITE_SOCKET_URL=${{ vars.VITE_SOCKET_URL }}
          VITE_HCAPTCHA_SITEKEY=${{ vars.VITE_HCAPTCHA_SITEKEY }}
          EOF
          echo "Generated .env.production:"
          cat .env.production

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPRAVA_API_URL: ${{ vars.SPRAVA_API_URL }}
          VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL }}
          VITE_HCAPTCHA_SITEKEY: ${{ vars.VITE_HCAPTCHA_SITEKEY }}
        with:
          projectPath: apps/desktop/sprava
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "Sprava ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false

  # Publish update artifacts to the public releases repo
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./artifacts
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --dir ./artifacts || true
          echo "Downloaded assets:"
          ls -la ./artifacts/

      - name: Generate latest.json for updater
        env:
          TAG: ${{ github.ref_name }}
          PUBLIC_REPO: ${{ vars.RELEASES_REPO }}
        run: |
          VERSION="${TAG#desktop-v}"
          BASE_URL="https://github.com/${PUBLIC_REPO}/releases/download/${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read signatures
          read_sig() { [ -f "$1" ] && cat "$1" || echo ""; }

          DARWIN_AARCH64_SIG=$(read_sig ./artifacts/Sprava.app.tar.gz.sig)
          DARWIN_X86_SIG=$(read_sig ./artifacts/Sprava.app.tar.gz.sig)
          LINUX_SIG=$(read_sig ./artifacts/Sprava_${VERSION}_amd64.AppImage.tar.gz.sig)
          WINDOWS_SIG=$(read_sig ./artifacts/Sprava_${VERSION}_x64-setup.nsis.zip.sig)

          # Find actual filenames (handle case variations)
          find_asset() {
            local pattern="$1"
            ls ./artifacts/$pattern 2>/dev/null | head -1 | xargs -I{} basename {} || echo ""
          }

          # macOS signatures — tauri-action may produce per-target sig files
          AARCH64_SIG_FILE=$(find_asset "*aarch64*tar.gz.sig")
          X86_SIG_FILE=$(find_asset "*x64*tar.gz.sig")
          AARCH64_TAR=$(find_asset "*aarch64*tar.gz" | head -1)
          X86_TAR=$(find_asset "*x64*.app.tar.gz" | head -1)

          # Re-read per-target sigs if they exist
          [ -n "$AARCH64_SIG_FILE" ] && DARWIN_AARCH64_SIG=$(cat "./artifacts/$AARCH64_SIG_FILE")
          [ -n "$X86_SIG_FILE" ] && DARWIN_X86_SIG=$(cat "./artifacts/$X86_SIG_FILE")

          # Determine actual asset names
          LINUX_TAR=$(find_asset "*AppImage.tar.gz")
          WINDOWS_ZIP=$(find_asset "*nsis.zip")

          # Fallback: if no nsis.zip, try msi.zip
          [ -z "$WINDOWS_ZIP" ] && WINDOWS_ZIP=$(find_asset "*x64_en-US.msi.zip")
          [ -z "$WINDOWS_SIG" ] && WINDOWS_SIG=$(read_sig ./artifacts/*msi.zip.sig)

          cat > ./artifacts/latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${DARWIN_AARCH64_SIG}",
                "url": "${BASE_URL}/${AARCH64_TAR:-Sprava.app.tar.gz}"
              },
              "darwin-x86_64": {
                "signature": "${DARWIN_X86_SIG}",
                "url": "${BASE_URL}/${X86_TAR:-Sprava.app.tar.gz}"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE_URL}/${LINUX_TAR:-Sprava_${VERSION}_amd64.AppImage.tar.gz}"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_SIG}",
                "url": "${BASE_URL}/${WINDOWS_ZIP:-Sprava_${VERSION}_x64-setup.nsis.zip}"
              }
            }
          }
          ENDJSON

          echo "Generated latest.json:"
          cat ./artifacts/latest.json

      - name: Publish to public releases repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          PUBLIC_REPO="${{ vars.RELEASES_REPO }}"

          # Delete existing release if any
          gh release delete "$TAG" --repo "$PUBLIC_REPO" --yes 2>/dev/null || true
          gh api repos/$PUBLIC_REPO/git/refs/tags/$TAG -X DELETE 2>/dev/null || true

          # Create new release and upload all artifacts
          gh release create "$TAG" \
            --repo "$PUBLIC_REPO" \
            --title "Sprava $TAG" \
            --notes "See the assets below to download and install." \
            ./artifacts/*
