services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sprava}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-sprava}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-sprava} -d ${POSTGRES_DB:-sprava}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-sprava}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-sprava}"
      AUTH_TYPE: plain
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
      MIN_POOL_SIZE: "5"
      LISTEN_PORT: "6432"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
      --maxmemory 550mb
      --maxmemory-policy volatile-lru
      --activerehashing yes
      --lazyfree-lazy-eviction yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    image: ghcr.io/${GHCR_REPO_OWNER:-daniil}/sprava-server:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    init: true
    ports:
      - "${SERVER_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sprava}:${POSTGRES_PASSWORD:-change-me}@pgbouncer:5432/${POSTGRES_DB:-sprava}
      DATABASE_DIRECT_URL: postgresql://${POSTGRES_USER:-sprava}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-sprava}
      REDIS_URL: redis://redis:6379
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const http=require('http');const req=http.get('http://127.0.0.1:3000',res=>process.exit(res.statusCode<500?0:1));req.on('error',()=>process.exit(1));\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 8

  voice-sfu:
    image: ghcr.io/${GHCR_REPO_OWNER:-daniil}/sprava-voice-sfu:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/voice-sfu/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://127.0.0.1:6379
      MEDIASOUP_LISTEN_IP: "0.0.0.0"
      MEDIASOUP_ANNOUNCED_IP: "${MEDIASOUP_ANNOUNCED_IP}"
      RTC_MIN_PORT: "${RTC_MIN_PORT:-10000}"
      RTC_MAX_PORT: "${RTC_MAX_PORT:-59999}"
    # host networking = best for mediasoup on Linux (no UDP NAT)
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
